<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐵 میمون دونده جنگل | Jungle Monkey Run 3D</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 30px;
      pointer-events: none;
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .banana-count {
      font-size: 24px;
      font-weight: bold;
      color: #ffd700;
    }
    #score {
      font-size: 24px;
      color: white;
    }
    #gameover {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 30px 50px;
      border-radius: 20px;
      text-align: center;
      display: none;
      backdrop-filter: blur(10px);
      border: 2px solid #ffaa00;
    }
    #gameover h2 {
      color: #ffaa00;
      margin: 0 0 15px;
      font-size: 36px;
    }
    #restartBtn {
      background: #ffaa00;
      border: none;
      color: black;
      font-weight: bold;
      padding: 12px 30px;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.2s;
    }
    #restartBtn:hover {
      background: #ffcc44;
      transform: scale(1.05);
    }
    .instruction {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.5);
      padding: 8px 25px;
      border-radius: 20px;
      font-size: 14px;
      backdrop-filter: blur(4px);
    }
    @media (max-width: 600px) {
      #info { top: 10px; padding: 5px 15px; }
      .banana-count, #score { font-size: 18px; }
      .instruction { bottom: 15px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="info">
    <span>🍌 <span id="bananaCounter" class="banana-count">0</span></span>
    <span>🏃 <span id="scoreDisplay">0</span>m</span>
  </div>
  <div id="gameover">
    <h2>🏁 بازی تمام شد!</h2>
    <p>موز جمع شده: <span id="finalBananas">0</span> 🍌</p>
    <p>مسافت: <span id="finalDistance">0</span> متر</p>
    <button id="restartBtn">🔄 دوباره</button>
  </div>
  <div class="instruction">⌨️ Space / ⬆️ یا کلیک/لمس برای پرش | 🐒 از سنگ‌ها رد شو</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ---------- تنظیمات ----------
    const WORLD_SPEED = 0.35;
    const JUMP_FORCE = 0.28;
    const GRAVITY = 0.012;
    const GROUND_Y = 0;
    const MONKEY_START_X = -2.5;
    
    // متغیرهای بازی
    let scene, camera, renderer, labelRenderer;
    let monkey, monkeyGroup;
    let ground, trees = [], obstacles = [], bananas = [];
    let particles = [];
    let clock = new THREE.Clock();
    let gameActive = true;
    let score = 0;
    let bananaCount = 0;
    let velocityY = 0;
    let isGrounded = true;
    let jumpPressed = false;
    
    // برای کنترل لمسی/کلیک
    let touchActive = false;

    // المان‌های UI
    const bananaCounterEl = document.getElementById('bananaCounter');
    const scoreDisplayEl = document.getElementById('scoreDisplay');
    const gameoverDiv = document.getElementById('gameover');
    const finalBananasEl = document.getElementById('finalBananas');
    const finalDistanceEl = document.getElementById('finalDistance');
    const restartBtn = document.getElementById('restartBtn');

    // ---------- ساخت صحنه ----------
    function initScene() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87CEEB); // آسمان آبی
      
      // مه برای عمق جنگل
      scene.fog = new THREE.Fog(0x87CEEB, 15, 45);
      
      // نورپردازی
      const ambientLight = new THREE.AmbientLight(0x404066);
      scene.add(ambientLight);
      
      const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
      dirLight.position.set(10, 25, 15);
      dirLight.castShadow = true;
      dirLight.receiveShadow = true;
      dirLight.shadow.mapSize.width = 512;
      dirLight.shadow.mapSize.height = 512;
      dirLight.shadow.camera.near = 1;
      dirLight.shadow.camera.far = 60;
      dirLight.shadow.camera.left = -20;
      dirLight.shadow.camera.right = 20;
      dirLight.shadow.camera.top = 20;
      dirLight.shadow.camera.bottom = -10;
      scene.add(dirLight);
      
      // نور تکمیلی
      const fillLight = new THREE.PointLight(0xccddff, 0.7);
      fillLight.position.set(-5, 8, 10);
      scene.add(fillLight);
    }

    function createGround() {
      // زمین با بافت چمن
      const groundGeometry = new THREE.PlaneGeometry(40, 30);
      const groundMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x3a5f3a,
        roughness: 0.9,
        metalness: 0.1
      });
      ground = new THREE.Mesh(groundGeometry, groundMaterial);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.2;
      ground.receiveShadow = true;
      scene.add(ground);
      
      // اضافه کردن جزئیات چمن مانند (تکه‌های کوچک)
      for (let i = 0; i < 80; i++) {
        const bladeGeom = new THREE.ConeGeometry(0.08, 0.4, 4);
        const bladeMat = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
        const blade = new THREE.Mesh(bladeGeom, bladeMat);
        const angle = Math.random() * Math.PI * 2;
        const radius = 8 + Math.random() * 12;
        blade.position.x = Math.cos(angle) * radius;
        blade.position.z = Math.sin(angle) * radius - 3;
        blade.position.y = 0.0;
        blade.castShadow = true;
        blade.receiveShadow = true;
        scene.add(blade);
      }
    }

    // ساخت میمون (ترکیبی از اشکال هندسی)
    function createMonkey() {
      monkeyGroup = new THREE.Group();
      
      // بدن
      const bodyGeom = new THREE.SphereGeometry(0.55, 16, 16);
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.4 });
      const body = new THREE.Mesh(bodyGeom, bodyMat);
      body.castShadow = true;
      body.receiveShadow = true;
      body.position.y = 0.7;
      monkeyGroup.add(body);
      
      // شکم روشن
      const bellyGeom = new THREE.SphereGeometry(0.35, 16, 16);
      const bellyMat = new THREE.MeshStandardMaterial({ color: 0xD2B48C, roughness: 0.5 });
      const belly = new THREE.Mesh(bellyGeom, bellyMat);
      belly.castShadow = true;
      belly.receiveShadow = true;
      belly.position.set(0, 0.55, 0.4);
      monkeyGroup.add(belly);
      
      // سر
      const headGeom = new THREE.SphereGeometry(0.4, 16, 16);
      const headMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.3 });
      const head = new THREE.Mesh(headGeom, headMat);
      head.castShadow = true;
      head.receiveShadow = true;
      head.position.set(0, 1.25, 0.1);
      monkeyGroup.add(head);
      
      // صورت
      const faceGeom = new THREE.SphereGeometry(0.28, 16, 16);
      const faceMat = new THREE.MeshStandardMaterial({ color: 0xD2B48C, roughness: 0.5 });
      const face = new THREE.Mesh(faceGeom, faceMat);
      face.castShadow = true;
      face.receiveShadow = true;
      face.position.set(0, 1.2, 0.45);
      monkeyGroup.add(face);
      
      // چشم‌ها
      const eyeGeom = new THREE.SphereGeometry(0.1, 8, 8);
      const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
      const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
      leftEye.position.set(-0.15, 1.35, 0.55);
      monkeyGroup.add(leftEye);
      const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
      rightEye.position.set(0.15, 1.35, 0.55);
      monkeyGroup.add(rightEye);
      
      // گوش‌ها
      const earGeom = new THREE.SphereGeometry(0.15, 8, 8);
      const earMat = new THREE.MeshStandardMaterial({ color: 0x6B4226 });
      const leftEar = new THREE.Mesh(earGeom, earMat);
      leftEar.position.set(-0.35, 1.45, 0.0);
      monkeyGroup.add(leftEar);
      const rightEar = new THREE.Mesh(earGeom, earMat);
      rightEar.position.set(0.35, 1.45, 0.0);
      monkeyGroup.add(rightEar);
      
      // پاها
      const legGeom = new THREE.CylinderGeometry(0.15, 0.18, 0.5);
      const legMat = new THREE.MeshStandardMaterial({ color: 0x6B4226 });
      const leftLeg = new THREE.Mesh(legGeom, legMat);
      leftLeg.position.set(-0.2, 0.25, 0.0);
      leftLeg.castShadow = true;
      leftLeg.receiveShadow = true;
      monkeyGroup.add(leftLeg);
      const rightLeg = new THREE.Mesh(legGeom, legMat);
      rightLeg.position.set(0.2, 0.25, 0.0);
      rightLeg.castShadow = true;
      rightLeg.receiveShadow = true;
      monkeyGroup.add(rightLeg);
      
      // دم
      const tailCurve = new THREE.CubicBezierCurve3(
        new THREE.Vector3(0, 0.5, -0.4),
        new THREE.Vector3(0.2, 1.0, -0.8),
        new THREE.Vector3(-0.3, 1.4, -0.9),
        new THREE.Vector3(-0.1, 1.8, -0.6)
      );
      const tailGeom = new THREE.TubeGeometry(tailCurve, 20, 0.07, 8, false);
      const tailMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
      const tail = new THREE.Mesh(tailGeom, tailMat);
      tail.castShadow = true;
      monkeyGroup.add(tail);
      
      monkeyGroup.position.set(MONKEY_START_X, GROUND_Y, 0);
      scene.add(monkeyGroup);
      return monkeyGroup;
    }

    // ساخت درخت
    function createTree(x, z) {
      const treeGroup = new THREE.Group();
      
      // تنه
      const trunkHeight = 2.5 + Math.random() * 2;
      const trunkGeom = new THREE.CylinderGeometry(0.4, 0.6, trunkHeight, 8);
      const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.9 });
      const trunk = new THREE.Mesh(trunkGeom, trunkMat);
      trunk.position.y = trunkHeight/2;
      trunk.castShadow = true;
      trunk.receiveShadow = true;
      treeGroup.add(trunk);
      
      // برگ‌ها (چند لایه)
      const leafMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32, roughness: 0.4 });
      for (let i = 0; i < 3; i++) {
        const leafGeom = new THREE.ConeGeometry(0.9 - i*0.15, 1.2, 8);
        const leaf = new THREE.Mesh(leafGeom, leafMat);
        leaf.position.y = trunkHeight + 0.3 + i * 0.7;
        leaf.castShadow = true;
        leaf.receiveShadow = true;
        treeGroup.add(leaf);
      }
      
      treeGroup.position.set(x, 0, z);
      return treeGroup;
    }

    // ساخت مانع (سنگ)
    function createRock(x, z) {
      const rockGroup = new THREE.Group();
      const rockGeom = new THREE.DodecahedronGeometry(0.7 + Math.random()*0.4, 0);
      const rockMat = new THREE.MeshStandardMaterial({ color: 0x808080, roughness: 0.7, metalness: 0.2 });
      const rock = new THREE.Mesh(rockGeom, rockMat);
      rock.castShadow = true;
      rock.receiveShadow = true;
      rock.position.y = 0.5;
      rockGroup.add(rock);
      
      // سنگ کوچک کناری
      const smallRockGeom = new THREE.DodecahedronGeometry(0.3, 0);
      const smallRock = new THREE.Mesh(smallRockGeom, rockMat);
      smallRock.position.set(0.5, 0.2, 0.4);
      smallRock.castShadow = true;
      rockGroup.add(smallRock);
      
      rockGroup.position.set(x, 0, z);
      return rockGroup;
    }

    // ساخت موز
    function createBanana(x, y, z) {
      const group = new THREE.Group();
      
      // بدنه موز
      const curve = new THREE.CubicBezierCurve3(
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0.2, 0.2, 0),
        new THREE.Vector3(-0.1, 0.5, 0),
        new THREE.Vector3(0, 0.7, 0)
      );
      const tubeGeom = new THREE.TubeGeometry(curve, 12, 0.1, 8, false);
      const tubeMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.3, metalness: 0.1 });
      const bananaBody = new THREE.Mesh(tubeGeom, tubeMat);
      bananaBody.castShadow = true;
      bananaBody.receiveShadow = true;
      group.add(bananaBody);
      
      // نوک قهوه‌ای
      const tipGeom = new THREE.SphereGeometry(0.12, 4);
      const tipMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
      const tip = new THREE.Mesh(tipGeom, tipMat);
      tip.position.set(0, 0.7, 0);
      group.add(tip);
      
      group.position.set(x, y, z);
      group.rotation.z = Math.random() * Math.PI;
      return group;
    }

    // ایجاد محیط اولیه
    function populateWorld() {
      // درختان در دو طرف مسیر
      for (let z = -15; z < 20; z += 4.5) {
        const leftTree = createTree(-6 + Math.random()*1.5, z);
        const rightTree = createTree(5.5 + Math.random()*1.5, z);
        scene.add(leftTree);
        scene.add(rightTree);
        trees.push(leftTree, rightTree);
      }
    }

    // ریست کامل بازی
    function resetGame() {
      // حذف اشیاء قدیمی
      while(obstacles.length > 0) {
        scene.remove(obstacles.pop());
      }
      while(bananas.length > 0) {
        scene.remove(bananas.pop());
      }
      trees.forEach(t => scene.remove(t));
      trees = [];
      
      // ریست متغیرها
      score = 0;
      bananaCount = 0;
      velocityY = 0;
      isGrounded = true;
      gameActive = true;
      
      if (monkeyGroup) {
        monkeyGroup.position.set(MONKEY_START_X, GROUND_Y, 0);
        monkeyGroup.rotation.set(0, 0, 0);
      }
      
      updateUI();
      gameoverDiv.style.display = 'none';
      populateWorld();
      
      // اضافه کردن چند مانع و موز اولیه
      for (let z = -8; z < -2; z += 3) {
        addObstacleAt(z - 2);
      }
      for (let z = -7; z < 0; z += 2.5) {
        addBananaAt(z);
      }
    }

    function addObstacleAt(zPos) {
      const rock = createRock(0, zPos);
      scene.add(rock);
      obstacles.push(rock);
    }

    function addBananaAt(zPos) {
      const banana = createBanana(0, 1.0 + Math.random()*0.8, zPos);
      scene.add(banana);
      bananas.push(banana);
    }

    function updateUI() {
      bananaCounterEl.textContent = bananaCount;
      scoreDisplayEl.textContent = Math.floor(score);
    }

    function gameOver() {
      gameActive = false;
      finalBananasEl.textContent = bananaCount;
      finalDistanceEl.textContent = Math.floor(score);
      gameoverDiv.style.display = 'block';
    }

    // برخورد ساده
    function checkCollisions() {
      if (!gameActive || !monkeyGroup) return;
      
      const monkeyPos = monkeyGroup.position;
      const monkeyRadius = 0.65;
      
      // برخورد با موانع
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        const dist = monkeyPos.distanceTo(obs.position);
        if (dist < (monkeyRadius + 0.7)) {
          gameOver();
          return;
        }
      }
      
      // جمع‌آوری موز
      for (let i = bananas.length - 1; i >= 0; i--) {
        const ban = bananas[i];
        const dist = monkeyPos.distanceTo(ban.position);
        if (dist < 0.9) {
          scene.remove(ban);
          bananas.splice(i, 1);
          bananaCount++;
          updateUI();
          // افکت کوچک
          createCollectParticles(ban.position);
        }
      }
    }

    function createCollectParticles(pos) {
      for (let i = 0; i < 8; i++) {
        const geom = new THREE.SphereGeometry(0.08, 4);
        const mat = new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: new THREE.Color(0x331100) });
        const particle = new THREE.Mesh(geom, mat);
        particle.position.copy(pos);
        particle.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 0.2,
          Math.random() * 0.2,
          (Math.random() - 0.5) * 0.2
        );
        scene.add(particle);
        particles.push(particle);
      }
    }

    // حلقه اصلی بازی
    function animate() {
      requestAnimationFrame(animate);
      
      const delta = clock.getDelta();
      // محدود کردن delta برای جلوگیری از جهش
      const safeDelta = Math.min(delta, 0.1);
      
      if (gameActive && monkeyGroup) {
        // حرکت جهان به سمت میمون
        const moveAmount = WORLD_SPEED * safeDelta * 60;
        score += moveAmount * 2;
        
        // جابجایی موانع
        for (let i = obstacles.length - 1; i >= 0; i--) {
          obstacles[i].position.z += moveAmount;
          if (obstacles[i].position.z > 8) {
            scene.remove(obstacles[i]);
            obstacles.splice(i, 1);
          }
        }
        
        // جابجایی موزها
        for (let i = bananas.length - 1; i >= 0; i--) {
          bananas[i].position.z += moveAmount;
          if (bananas[i].position.z > 8) {
            scene.remove(bananas[i]);
            bananas.splice(i, 1);
          }
        }
        
        // جابجایی درختان و ایجاد مجدد
        for (let i = trees.length - 1; i >= 0; i--) {
          trees[i].position.z += moveAmount;
          if (trees[i].position.z > 12) {
            trees[i].position.z -= 35;
          }
        }
        
        // ایجاد موانع و موز جدید
        if (obstacles.length < 5 && Math.random() < 0.08) {
          addObstacleAt(-12 - Math.random() * 4);
        }
        if (bananas.length < 6 && Math.random() < 0.1) {
          addBananaAt(-13 - Math.random() * 5);
        }
        
        // فیزیک پرش
        if (jumpPressed && isGrounded && gameActive) {
          velocityY = JUMP_FORCE;
          isGrounded = false;
          jumpPressed = false;
        }
        
        velocityY -= GRAVITY * safeDelta * 60;
        monkeyGroup.position.y += velocityY;
        
        if (monkeyGroup.position.y <= GROUND_Y) {
          monkeyGroup.position.y = GROUND_Y;
          velocityY = 0;
          isGrounded = true;
        }
        
        // انیمیشن دویدن (چرخش پاها با سینوس)
        monkeyGroup.children.forEach((child, index) => {
          if (child.geometry && child.geometry.type === 'CylinderGeometry') {
            child.rotation.x = Math.sin(score * 0.5) * 0.5;
          }
        });
        
        checkCollisions();
        updateUI();
        
        // به‌روزرسانی ذرات
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.position.y += p.velocity.y;
          p.position.x += p.velocity.x;
          p.position.z += p.velocity.z;
          p.material.opacity = 0.8;
          if (p.position.y < 0 || p.material.opacity < 0.1) {
            scene.remove(p);
            particles.splice(i, 1);
          }
        }
      }
      
      // چرخش ملایم دوربین برای حس سه بعدی
      if (camera) {
        camera.position.x = monkeyGroup.position.x + 3.5;
        camera.position.y = 4.2;
        camera.position.z = monkeyGroup.position.z + 5.5;
        camera.lookAt(monkeyGroup.position.x, 1.2, monkeyGroup.position.z - 1);
      }
      
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    // مدیریت ورودی
    function setupControls() {
      window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
          e.preventDefault();
          if (gameActive) jumpPressed = true;
        }
      });
      
      window.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (gameActive) jumpPressed = true;
      });
      
      window.addEventListener('mousedown', (e) => {
        if (gameActive) jumpPressed = true;
      });
      
      restartBtn.addEventListener('click', () => {
        resetGame();
      });
    }

    // راه‌اندازی
    function init() {
      initScene();
      
      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 60);
      camera.position.set(3, 4.5, 6);
      
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);
      
      labelRenderer = new CSS2DRenderer();
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.domElement.style.position = 'absolute';
      labelRenderer.domElement.style.top = '0px';
      labelRenderer.domElement.style.left = '0px';
      labelRenderer.domElement.style.pointerEvents = 'none';
      document.body.appendChild(labelRenderer.domElement);
      
      createGround();
      monkey = createMonkey();
      populateWorld();
      setupControls();
      
      // موانع و موزهای اولیه
      for (let z = -6; z < -1; z += 2.8) {
        addObstacleAt(z);
      }
      for (let z = -7; z < 0; z += 2.2) {
        addBananaAt(z);
      }
      
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
      });
      
      animate();
    }

    init();
  </script>
</body>
</html>
