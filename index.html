<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Vazirmatn:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0e0a;
    --grid-bg:  #0d120d;
    --border:   #1a2e1a;
    --snake:    #39ff14;
    --snake2:   #2bcc0f;
    --head:     #7fff00;
    --food:     #ff3c3c;
    --food2:    #ff8080;
    --text:     #39ff14;
    --dim:      #1e3a1e;
    --amber:    #ffb300;
    --dead:     #ff3c3c;
    --glow:     rgba(57,255,20,0.18);
    --cell:     20px;
    --cols:     25;
    --rows:     20;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: calc(var(--cell) * var(--cols) + 4px);
    padding: 0 2px;
  }

  #title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--text);
    text-shadow: 0 0 12px var(--text), 0 0 30px var(--glow);
  }

  #score-block { text-align: right; }
  #score-label { font-size: 10px; color: var(--dim); letter-spacing: 3px; }
  #score-val   { font-size: 26px; color: var(--amber); text-shadow: 0 0 10px var(--amber); line-height: 1; }

  #canvas-wrap {
    position: relative;
    border: 2px solid var(--border);
    box-shadow: 0 0 0 1px #0a0e0a, 0 0 30px var(--glow), inset 0 0 40px rgba(0,0,0,0.6);
  }

  canvas {
    display: block;
    background: var(--grid-bg);
    image-rendering: pixelated;
  }

  #canvas-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent, transparent 1px,
      rgba(0,0,0,0.08) 1px, rgba(0,0,0,0.08) 2px
    );
    pointer-events: none;
  }

  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(1px);
    transition: opacity .25s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  #overlay-title {
    font-size: 28px;
    letter-spacing: 6px;
    text-shadow: 0 0 20px currentColor;
  }
  #overlay-title.dead { color: var(--dead); }
  #overlay-title.go   { color: var(--text); }

  #overlay-sub   { font-size: 12px; color: #aaa; letter-spacing: 2px; }
  #overlay-score { font-size: 16px; color: var(--amber); text-shadow: 0 0 8px var(--amber); }

  .btn {
    margin-top: 8px;
    padding: 10px 32px;
    background: transparent;
    border: 1px solid var(--text);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, box-shadow .15s;
    text-shadow: 0 0 8px var(--text);
    box-shadow: 0 0 10px var(--glow);
  }
  .btn:hover {
    background: rgba(57,255,20,0.12);
    box-shadow: 0 0 20px var(--text);
  }

  #footer { display: flex; gap: 24px; font-size: 11px; color: var(--dim); letter-spacing: 2px; }
  #footer kbd { color: #4a7a4a; padding: 1px 4px; border: 1px solid #1e3a1e; border-radius: 2px; }

  #speed-bar { display: flex; gap: 4px; align-items: center; font-size: 10px; color: var(--dim); letter-spacing: 3px; }
  .pip { width: 10px; height: 10px; border: 1px solid var(--dim); transition: background .2s; }
  .pip.active { background: var(--amber); border-color: var(--amber); box-shadow: 0 0 6px var(--amber); }

  #hi-block { font-size: 11px; color: var(--dim); letter-spacing: 2px; }
  #hi-val   { color: var(--amber); }

  #dpad {
    display: none;
    grid-template-columns: 44px 44px 44px;
    grid-template-rows: 44px 44px 44px;
    gap: 4px;
    margin-top: 8px;
  }
  @media (max-width: 600px), (pointer: coarse) {
    #dpad { display: grid; }
    :root { --cell: 16px; }
  }
  .dpad-btn {
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    border-radius: 4px;
    transition: background .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad-btn:active { background: rgba(57,255,20,0.15); }
  .dpad-center { grid-column:2; grid-row:2; font-size:11px; letter-spacing:1px; color: var(--dim); }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="title">◈ SNAKE</div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div id="score-block">
        <div id="score-label">SCORE</div>
        <div id="score-val">0</div>
      </div>
      <div id="hi-block">HI &nbsp;<span id="hi-val">0</span></div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="cv"></canvas>
    <div id="overlay">
      <div id="overlay-title" class="go">◈ SNAKE</div>
      <div id="overlay-sub">press space or tap start</div>
      <div id="overlay-score" style="display:none"></div>
      <button class="btn" id="start-btn">START</button>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;width:calc(var(--cell) * 25 + 4px)">
    <div id="speed-bar">
      LVL &nbsp;
      <div class="pip active" id="p1"></div>
      <div class="pip" id="p2"></div>
      <div class="pip" id="p3"></div>
      <div class="pip" id="p4"></div>
      <div class="pip" id="p5"></div>
    </div>
    <div id="footer">
      <span><kbd>↑↓←→</kbd> move</span>
      <span><kbd>P</kbd> pause</span>
      <span><kbd>SPC</kbd> start</span>
    </div>
  </div>

  <div id="dpad">
    <div></div>
    <button class="dpad-btn" id="d-up">▲</button>
    <div></div>
    <button class="dpad-btn" id="d-left">◀</button>
    <button class="dpad-btn dpad-center" id="d-pause">II</button>
    <button class="dpad-btn" id="d-right">▶</button>
    <div></div>
    <button class="dpad-btn" id="d-down">▼</button>
    <div></div>
  </div>

</div>

<script>
(() => {
  const COLS = 25, ROWS = 20;
  const CELL = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell')) || 20;

  const cv  = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  cv.width  = COLS * CELL;
  cv.height = ROWS * CELL;

  document.getElementById('canvas-wrap').style.width = cv.width + 'px';

  const scoreEl  = document.getElementById('score-val');
  const hiEl     = document.getElementById('hi-val');
  const overlay  = document.getElementById('overlay');
  const oTitle   = document.getElementById('overlay-title');
  const oSub     = document.getElementById('overlay-sub');
  const oScore   = document.getElementById('overlay-score');
  const startBtn = document.getElementById('start-btn');
  const pips     = [1,2,3,4,5].map(i => document.getElementById('p'+i));

  let snake, dir, nextDir, food, score, hi, alive, paused, raf, lastTime, interval;

  hi = parseInt(localStorage.getItem('snake_hi') || '0');
  hiEl.textContent = hi;

  const SPEEDS = [200, 160, 130, 100, 80];
  function levelOf(s) {
    if (s < 5)  return 0;
    if (s < 10) return 1;
    if (s < 18) return 2;
    if (s < 30) return 3;
    return 4;
  }
  function updatePips(lvl) {
    pips.forEach((p, i) => p.classList.toggle('active', i <= lvl));
  }

  function init() {
    const mid = { x: Math.floor(COLS/2), y: Math.floor(ROWS/2) };
    snake    = [mid, {x: mid.x-1, y: mid.y}, {x: mid.x-2, y: mid.y}];
    dir      = { x: 1, y: 0 };
    nextDir  = { x: 1, y: 0 };
    score    = 0;
    alive    = true;
    paused   = false;
    interval = SPEEDS[0];
    scoreEl.textContent = '0';
    updatePips(0);
    placeFood();
    render();
  }

  function placeFood() {
    const set = new Set(snake.map(s => s.x + ',' + s.y));
    let f;
    do { f = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) }; }
    while (set.has(f.x + ',' + f.y));
    food = f;
    food.pulse = 0;
  }

  lastTime = 0;
  let accumulator = 0;

  function loop(ts) {
    if (!alive || paused) return;
    raf = requestAnimationFrame(loop);
    const dt = ts - lastTime;
    lastTime = ts;
    accumulator += dt;
    food.pulse = (food.pulse + dt * 0.005) % (Math.PI * 2);
    if (accumulator >= interval) {
      accumulator -= interval;
      tick();
    }
    render();
  }

  function tick() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { die(); return; }
    if (snake.some(s => s.x === head.x && s.y === head.y)) { die(); return; }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > hi) { hi = score; hiEl.textContent = hi; localStorage.setItem('snake_hi', hi); }
      const lvl = levelOf(score);
      interval = SPEEDS[lvl];
      updatePips(lvl);
      placeFood();
    } else {
      snake.pop();
    }
  }

  function die() {
    alive = false;
    cancelAnimationFrame(raf);
    render(true);
    setTimeout(() => {
      oTitle.textContent = 'GAME OVER';
      oTitle.className   = 'dead';
      oSub.textContent   = 'better luck next time';
      oScore.style.display = '';
      oScore.textContent = 'SCORE: ' + score;
      startBtn.textContent = 'RETRY';
      overlay.classList.remove('hidden');
    }, 400);
  }

  const C = {
    bg: '#0d120d', grid: '#111811',
    snake: '#39ff14', head: '#ccff88',
    dead: '#ff3c3c', food: '#ff3c3c',
  };

  function render(dead = false) {
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, cv.width, cv.height);

    ctx.strokeStyle = C.grid;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, cv.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(cv.width, y*CELL); ctx.stroke();
    }

    const fp = food.pulse || 0;
    const fglow = 4 + Math.sin(fp) * 3;
    const fSize = CELL - 6 + Math.sin(fp) * 2;
    const fx = food.x * CELL + CELL/2;
    const fy = food.y * CELL + CELL/2;
    ctx.save();
    const gr = ctx.createRadialGradient(fx, fy, 0, fx, fy, fglow * 2);
    gr.addColorStop(0, 'rgba(255,60,60,0.4)');
    gr.addColorStop(1, 'rgba(255,60,60,0)');
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.arc(fx, fy, fglow * 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = C.food;
    ctx.shadowColor = C.food;
    ctx.shadowBlur  = fglow;
    ctx.fillRect(food.x*CELL + (CELL-fSize)/2, food.y*CELL + (CELL-fSize)/2, fSize, fSize);
    ctx.restore();

    snake.forEach((seg, i) => {
      const x = seg.x * CELL, y = seg.y * CELL;
      const pad = dead ? 2 : (i === 0 ? 1 : 2);
      const r = CELL - pad*2;
      if (!dead) { ctx.save(); ctx.shadowColor = C.snake; ctx.shadowBlur = i === 0 ? 12 : 6; }
      const t = i / Math.max(snake.length - 1, 1);
      if (!dead) {
        ctx.fillStyle = i === 0 ? C.head : `hsl(${107 + t*20}, ${85 - t*20}%, ${40 + t*10}%)`;
      } else {
        ctx.fillStyle = `rgba(255, ${60 + t*40}, ${60 + t*40}, ${1 - t*0.4})`;
      }
      ctx.fillRect(x + pad, y + pad, r, r);
      if (!dead) ctx.restore();
      if (i === 0 && !dead) {
        ctx.fillStyle = '#000';
        const ex  = dir.y === 0 ? (dir.x > 0 ? x + CELL - 6 : x + 4) : x + CELL/2 - 4;
        const ey  = dir.x === 0 ? (dir.y > 0 ? y + CELL - 6 : y + 4) : y + CELL/2 - 4;
        const ex2 = dir.y === 0 ? ex : ex + 8;
        const ey2 = dir.x === 0 ? ey + 8 : ey;
        ctx.fillRect(ex, ey, 3, 3);
        ctx.fillRect(ex2, ey2, 3, 3);
      }
      if (i > 0 && !dead) {
        ctx.strokeStyle = C.bg; ctx.lineWidth = 1;
        ctx.strokeRect(x + pad, y + pad, r, r);
      }
    });
  }

  const DIRS = {
    ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1},
    ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
    w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0},
  };

  document.addEventListener('keydown', e => {
    if ((e.code === 'Space' || e.key === ' ') && !alive) { startGame(); return; }
    if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
    const nd = DIRS[e.key];
    if (!nd) return;
    if (alive && !paused && (nd.x !== -dir.x || nd.y !== -dir.y)) nextDir = nd;
    e.preventDefault();
  });

  function dpadPress(nd) {
    if (!alive) { startGame(); return; }
    if (alive && !paused && (nd.x !== -dir.x || nd.y !== -dir.y)) nextDir = nd;
  }
  document.getElementById('d-up').addEventListener('click',    () => dpadPress({x:0,y:-1}));
  document.getElementById('d-down').addEventListener('click',  () => dpadPress({x:0,y:1}));
  document.getElementById('d-left').addEventListener('click',  () => dpadPress({x:-1,y:0}));
  document.getElementById('d-right').addEventListener('click', () => dpadPress({x:1,y:0}));
  document.getElementById('d-pause').addEventListener('click', togglePause);
  startBtn.addEventListener('click', startGame);

  function startGame() {
    overlay.classList.add('hidden');
    init();
    lastTime = performance.now();
    accumulator = 0;
    raf = requestAnimationFrame(loop);
  }

  function togglePause() {
    if (!alive) return;
    paused = !paused;
    if (paused) {
      cancelAnimationFrame(raf);
      oTitle.textContent = 'PAUSED'; oTitle.className = 'go';
      oSub.textContent = 'press P or tap to resume';
      oScore.style.display = 'none';
      startBtn.textContent = 'RESUME';
      overlay.classList.remove('hidden');
    } else {
      overlay.classList.add('hidden');
      lastTime = performance.now(); accumulator = 0;
      raf = requestAnimationFrame(loop);
    }
  }

  let tx0, ty0;
  cv.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; e.preventDefault(); }, {passive:false});
  cv.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx0;
    const dy = e.changedTouches[0].clientY - ty0;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    if (Math.abs(dx) > Math.abs(dy)) dpadPress(dx > 0 ? {x:1,y:0} : {x:-1,y:0});
    else dpadPress(dy > 0 ? {x:0,y:1} : {x:0,y:-1});
  }, {passive:false});

  // preview
  snake = [{x:12,y:10},{x:11,y:10},{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  food  = {x:16, y:10, pulse:0};
  dir   = {x:1, y:0};
  render();

})();
</script>
</body>
</html>
