<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد من</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        /* صفحه ورود */
        #loginPage {
            width: 100vw;
            height: 100vh;
            background: url('https://cdn.stocksnap.io/img-thumbs/960w/colorful-art_ICYNNM3ZLN.jpg') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        #loginPage.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px 32px;
            border-radius: 32px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 340px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .login-box h2 {
            color: #fff;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 24px;
            font-size: 1.8em;
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1em;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }

        .login-box input:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .login-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            margin-top: 18px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: #fff;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 30px rgba(255, 107, 157, 0.3);
        }

        .login-box button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 40px rgba(255, 107, 157, 0.5);
        }

        .login-box .error {
            color: #ffb3b3;
            margin-top: 14px;
            font-size: 0.9em;
            height: 24px;
        }

        /* صفحه داشبورد */
        #dashboard {
            width: 100vw;
            height: 100vh;
            background: url('https://cdn.stocksnap.io/img-thumbs/960w/abstract-painted_O2UV4BLNFD.jpg') center/cover no-repeat;
            display: none;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            padding: 20px;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 28px;
            max-width: 900px;
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 35px;
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 28px 20px;
            border-radius: 28px;
            text-align: center;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
            cursor: default;
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .card .icon {
            font-size: 3em;
            margin-bottom: 12px;
            display: block;
        }

        .card h3 {
            font-weight: 500;
            font-size: 1.2em;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .card p {
            font-size: 0.9em;
            opacity: 0.7;
            font-weight: 300;
        }

        .card .value {
            font-size: 2em;
            font-weight: 600;
            margin-top: 10px;
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* دکمه خروج */
        .logout-btn {
            position: fixed;
            top: 24px;
            right: 28px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 0.95em;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.04);
        }

        /* ریسپانسیو */
        @media (max-width: 600px) {
            .dashboard-container {
                grid-template-columns: 1fr 1fr;
                gap: 16px;
                padding: 24px 18px;
                border-radius: 32px;
            }
            .card { padding: 20px 14px; }
            .card .icon { font-size: 2.2em; }
            .login-box { width: 92%; padding: 30px 20px; }
            .logout-btn { top: 16px; right: 16px; padding: 8px 16px; font-size: 0.8em; }
        }

        @media (max-width: 400px) {
            .dashboard-container {
                grid-template-columns: 1fr;
                gap: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- صفحه ورود -->
    <div id="loginPage">
        <div class="login-box">
            <h2>🔐 ورود به داشبورد</h2>
            <input type="password" id="passwordInput" placeholder="رمز عبور را وارد کنید" autofocus>
            <button onclick="checkPassword()">ورود</button>
            <div class="error" id="errorMsg"></div>
        </div>
    </div>

    <!-- صفحه داشبورد -->
    <div id="dashboard">
        <button class="logout-btn" onclick="logout()">🚪 خروج</button>
        <div class="dashboard-container">
            <div class="card">
                <span class="icon">📊</span>
                <h3>بازدید امروز</h3>
                <div class="value" id="visits">۰</div>
            </div>
            <div class="card">
                <span class="icon">👤</span>
                <h3>کاربران آنلاین</h3>
                <div class="value" id="online">۰</div>
            </div>
            <div class="card">
                <span class="icon">⭐</span>
                <h3>امتیاز شما</h3>
                <div class="value" id="score">۰</div>
            </div>
            <div class="card">
                <span class="icon">🕒</span>
                <h3>ساعت</h3>
                <div class="value" id="clock">۰۰:۰۰</div>
            </div>
        </div>
    </div>

    <script>
        // ===== توابع اصلی =====

        function checkPassword() {
            const input = document.getElementById('passwordInput');
            const error = document.getElementById('errorMsg');
            const loginPage = document.getElementById('loginPage');
            const dashboard = document.getElementById('dashboard');

            if (input.value === 'mmhhdd133') {
                loginPage.classList.add('hidden');
                dashboard.style.display = 'flex';
                startDashboard(); // شروع آمار و ساعت
            } else {
                error.textContent = '❌ رمز اشتباه است!';
                input.value = '';
                input.focus();
                const box = document.querySelector('.login-box');
                box.style.transform = 'scale(0.97)';
                setTimeout(() => box.style.transform = '', 150);
            }
        }

        // اجازه ورود با Enter
        document.getElementById('passwordInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        // ===== داشبورد =====
        let dashboardInterval = null;

        function startDashboard() {
            // مقداردهی اولیه
            document.getElementById('visits').textContent = Math.floor(Math.random() * 150 + 20);
            document.getElementById('online').textContent = Math.floor(Math.random() * 12 + 1);
            document.getElementById('score').textContent = Math.floor(Math.random() * 900 + 100);

            // بروزرسانی ساعت
            updateClock();
            if (dashboardInterval) clearInterval(dashboardInterval);
            dashboardInterval = setInterval(() => {
                updateClock();
                // تغییرات تصادفی کوچک برای پویایی
                let visits = parseInt(document.getElementById('visits').textContent);
                if (Math.random() > 0.7) {
                    document.getElementById('visits').textContent = visits + Math.floor(Math.random() * 3);
                }
                let online = parseInt(document.getElementById('online').textContent);
                if (Math.random() > 0.8) {
                    let change = Math.floor(Math.random() * 3) - 1;
                    document.getElementById('online').textContent = Math.max(1, online + change);
                }
            }, 3000);
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}`;
        }

        // ===== خروج =====
        function logout() {
            const loginPage = document.getElementById('loginPage');
            const dashboard = document.getElementById('dashboard');
            if (dashboardInterval) clearInterval(dashboardInterval);
            dashboard.style.display = 'none';
            loginPage.classList.remove('hidden');
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMsg').textContent = '';
            document.getElementById('passwordInput').focus();
        }

        // ===== 120 FPS Loop (همگام‌سازی با نرخ تازه‌سازی) =====
        let frameId = null;
        function smoothLoop() {
            // هر کاری که نیاز به آپدیت در هر فریم داره، اینجا قرار میگیره
            // الان فقط برای حفظ 120fps خالی گذاشتم
            frameId = requestAnimationFrame(smoothLoop);
        }
        smoothLoop();

        window.addEventListener('beforeunload', function() {
            if (frameId) cancelAnimationFrame(frameId);
            if (dashboardInterval) clearInterval(dashboardInterval);
        });
    </script>

</body>
</html>
