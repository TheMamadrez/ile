<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه ورود</title>
    <style>
        /* ریست و تنظیمات اولیه */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: Tahoma, sans-serif;
            overflow: hidden;
        }

        /* صفحه اول - ورود */
        #loginPage {
            width: 100vw;
            height: 100vh;
            background: url('https://cdn.stocksnap.io/img-thumbs/960w/colorful-art_ICYNNM3ZLN.jpg') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            transition: opacity 0.5s ease;
        }

        #loginPage.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-box h2 {
            color: #fff;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1em;
            outline: none;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .login-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            border: none;
            border-radius: 40px;
            background: #ff6b9d;
            color: #fff;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);
        }

        .login-box button:hover {
            background: #e05580;
            transform: scale(1.02);
        }

        .login-box .error {
            color: #ffb3b3;
            margin-top: 12px;
            font-size: 0.9em;
            height: 20px;
        }

        /* صفحه دوم - محتوا */
        #contentPage {
            width: 100vw;
            height: 100vh;
            background: url('https://cdn.stocksnap.io/img-thumbs/960w/abstract-painted_O2UV4BLNFD.jpg') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .content-box {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            max-width: 600px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        .content-box h1 {
            color: #fff;
            font-size: 2.2em;
            font-weight: 400;
            line-height: 1.6;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .content-box h1 span {
            color: #ffb3d1;
        }

        /* ریسپانسیو */
        @media (max-width: 480px) {
            .login-box { width: 90%; padding: 30px 20px; }
            .content-box h1 { font-size: 1.6em; }
        }
    </style>
</head>
<body>

    <!-- صفحه اول: ورود -->
    <div id="loginPage">
        <div class="login-box">
            <h2>🔐 ورود</h2>
            <input type="password" id="passwordInput" placeholder="رمز عبور را وارد کنید" autofocus>
            <button onclick="checkPassword()">ورود</button>
            <div class="error" id="errorMsg"></div>
        </div>
    </div>

    <!-- صفحه دوم: محتوا (در ابتدا مخفی) -->
    <div id="contentPage" style="display:none;">
        <div class="content-box">
            <h1>سلام من <span>محمدرضا</span> هستم و این سایت برای تست ساخته شده</h1>
        </div>
    </div>

    <script>
        // تابع بررسی رمز
        function checkPassword() {
            const input = document.getElementById('passwordInput');
            const error = document.getElementById('errorMsg');
            const loginPage = document.getElementById('loginPage');
            const contentPage = document.getElementById('contentPage');

            if (input.value === 'mmhhdd133') {
                // رمز درست: مخفی کردن صفحه ورود و نمایش صفحه محتوا
                loginPage.classList.add('hidden');
                contentPage.style.display = 'flex';
                // برای اجرای روان با ۱۲۰ فریم ریت، از requestAnimationFrame استفاده میکنیم
                requestAnimationFrame(() => {
                    // هیچ کاری لازم نیست، فقط برای همگام‌سازی با نرخ تازه‌سازی
                });
            } else {
                error.textContent = '❌ رمز اشتباه است!';
                input.value = '';
                input.focus();
                // لرزش ملایم برای خطا
                const box = document.querySelector('.login-box');
                box.style.transform = 'scale(0.98)';
                setTimeout(() => box.style.transform = '', 150);
            }
        }

        // اجازه ورود با کلید Enter
        document.getElementById('passwordInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // تنظیم برای اجرای روان (120fps)
        let frameId = null;
        function smoothLoop() {
            // این تابع برای همگام‌سازی با نرخ تازه‌سازی صفحه اجرا میشه
            // میتونی هر گونه انیمیشن یا به‌روزرسانی رو اینجا قرار بدی
            frameId = requestAnimationFrame(smoothLoop);
        }
        smoothLoop();

        // (اختیاری) وقتی صفحه عوض میشه، حلقه رو متوقف نکن
        window.addEventListener('beforeunload', function() {
            if (frameId) cancelAnimationFrame(frameId);
        });
    </script>

</body>
</html>
