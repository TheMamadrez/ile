<script type="module">
import * as THREE from 'three';

// ==================== GLOBALS ====================
let scene, camera, renderer, clock;
let monkey, monkeyBody;
const keys = {};
let camMode = 0;
const camModes = 3;
const MONKEY_SPEED = 6;
const MONKEY_SPRINT = 14;
const JUMP_FORCE = 10;
const GRAVITY = -25;
let velocityY = 0;
let onGround = true;
let runPhase = 0;
let yaw = 0;

// Touch state
let touchJoyActive = false;
let joyTouchId = null;
let joyCenter = { x: 0, y: 0 };
let joyInput = { x: 0, y: 0 }; // normalized -1 to 1
let touchJumpActive = false;
let touchSprintActive = false;

// World gen
const TREE_COUNT = 120;
const ROCK_COUNT = 60;
const FLOWER_COUNT = 200;
const BIRD_COUNT = 8;
const trees = [], rocks = [], flowers = [], birds = [];
let dustParticles;

// ==================== INIT ====================
function init() {
  clock = new THREE.Clock();
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x3a7d44, 0.008);
  scene.background = new THREE.Color(0x87CEEB);

  const skyGeo = new THREE.SphereGeometry(400, 32, 32);
  const skyMat = new THREE.ShaderMaterial({
    uniforms: {
      topColor: { value: new THREE.Color(0x0077ff) },
      bottomColor: { value: new THREE.Color(0xaaddff) },
      offset: { value: 20 },
      exponent: { value: 0.6 }
    },
    vertexShader: `varying vec3 vWorldPosition;void main(){vec4 wp=modelMatrix*vec4(position,1.0);vWorldPosition=wp.xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader: `uniform vec3 topColor;uniform vec3 bottomColor;uniform float offset;uniform float exponent;varying vec3 vWorldPosition;void main(){float h=normalize(vWorldPosition+offset).y;gl_FragColor=vec4(mix(bottomColor,topColor,max(pow(max(h,0.0),exponent),0.0)),1.0);}`,
    side: THREE.BackSide
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  const sun = new THREE.DirectionalLight(0xfff5e0, 1.8);
  sun.position.set(80, 100, 60);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  Object.assign(sun.shadow.camera, { left: -80, right: 80, top: 80, bottom: -80, near: 1, far: 250 });
  scene.add(sun);
  scene.add(new THREE.AmbientLight(0x405530, 0.6));
  scene.add(new THREE.HemisphereLight(0x87CEEB, 0x362907, 0.5));

  camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
  camera.position.set(0, 5, 10);

  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.appendChild(renderer.domElement);

  generateTerrain();
  generateForest();
  generateFlowers();
  generateRocks();
  generateMonkey();
  generateBirds();
  generateParticles();

  // Keyboard
  window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code==='KeyM') camMode=(camMode+1)%camModes; });
  window.addEventListener('keyup', e => keys[e.code] = false);
  window.addEventListener('resize', () => { camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

  setupMobileControls();

  const fill = document.getElementById('loadFill');
  fill.style.width = '100%';
  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 800);
  }, 600);

  animate();
}

// ==================== TERRAIN ====================
function getGroundHeight(x, z) {
  return Math.sin(x*0.02)*Math.cos(z*0.02)*2 + Math.sin(x*0.05+z*0.03)*0.8;
}

function generateTerrain() {
  const geo = new THREE.PlaneGeometry(400, 400, 200, 200);
  geo.rotateX(-Math.PI/2);
  const pos = geo.attributes.position;
  for (let i=0;i<pos.count;i++){
    const x=pos.getX(i),z=pos.getZ(i);
    let h=Math.sin(x*0.02)*Math.cos(z*0.02)*2+Math.sin(x*0.05+z*0.03)*0.8+(Math.random()-0.5)*0.3;
    const d=Math.sqrt(x*x+z*z); if(d<30) h*=d/30;
    pos.setY(i,h);
  }
  geo.computeVertexNormals();
  const colors=new Float32Array(pos.count*3);
  for(let i=0;i<pos.count;i++){
    const y=pos.getY(i); const n=Math.random()*0.15;
    colors[i*3]=y>2?0.5+n:0.15+n; colors[i*3+1]=y>2?0.45+n:0.35+n; colors[i*3+2]=y>2?0.2+n:0.08+n;
  }
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  scene.add(new THREE.Mesh(geo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.9})).translateY(0));
}

// ==================== FOREST ====================
function makeTree(h,tr){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(tr*0.6,tr,h*0.5,8),new THREE.MeshStandardMaterial({color:0x5c3a1e,roughness:0.9}));
  trunk.position.y=h*0.25; trunk.castShadow=true; g.add(trunk);
  const lc=[0x2d7a2d,0x3a8c3a,0x276b27,0x4a9e4a];
  for(let i=0;i<3+Math.floor(Math.random()*3);i++){
    const r=(h*0.35)*(1-i*0.2)+Math.random()*1.5;
    const fg=new THREE.IcosahedronGeometry(r,1);
    const fp=fg.attributes.position;
    for(let j=0;j<fp.count;j++){fp.setX(j,fp.getX(j)+(Math.random()-0.5)*r*0.3);fp.setY(j,fp.getY(j)+(Math.random()-0.5)*r*0.3);fp.setZ(j,fp.getZ(j)+(Math.random()-0.5)*r*0.3);}
    fg.computeVertexNormals();
    const fm=new THREE.MeshStandardMaterial({color:lc[Math.floor(Math.random()*lc.length)],roughness:0.8,flatShading:true});
    const f=new THREE.Mesh(fg,fm); f.position.y=h*0.5+i*h*0.18; f.castShadow=true; f.receiveShadow=true; g.add(f);
  }
  return g;
}

function generateForest() {
  const rng=()=>Math.random();
  for(let i=0;i<TREE_COUNT;i++){
    const x=(rng()-0.5)*350,z=(rng()-0.5)*350;
    if(Math.sqrt(x*x+z*z)<5)continue;
    const t=makeTree(6+rng()*8,0.3+rng()*0.4);
    t.position.set(x
,getGroundHeight(x,z),z); t.rotation.y=rng()*Math.PI*2;
    scene.add(t); trees.push(t);
  }
}

function generateFlowers(){
  const clr=[0xff6b6b,0xffd93d,0x6bc1ff,0xff85ff,0xffffff];
  for(let i=0;i<FLOWER_COUNT;i++){
    const x=(Math.random()-0.5)*300,z=(Math.random()-0.5)*300;
    const f=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0,0.4,4),new THREE.MeshStandardMaterial({color:clr[Math.floor(Math.random()*clr.length)]}));
    f.position.set(x,getGroundHeight(x,z)+0.15,z); scene.add(f);
  }
}

function generateRocks(){
  for(let i=0;i<ROCK_COUNT;i++){
    const x=(Math.random()-0.5)*350,z=(Math.random()-0.5)*350;
    const r=new THREE.Mesh(new THREE.DodecahedronGeometry(0.8+Math.random()*1.5,0),new THREE.MeshStandardMaterial({color:0x888888}));
    r.scale.set(1,0.4+Math.random()*0.4,1); r.position.set(x,getGroundHeight(x,z)-0.1,z);
    r.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3); r.castShadow=true; scene.add(r);
  }
}

// ==================== MONKEY ====================
function generateMonkey() {
  monkeyBody=new THREE.Group();
  const b=new THREE.MeshStandardMaterial({color:0x6e4a2e}),t=new THREE.MeshStandardMaterial({color:0xba956a});
  monkeyBody.add(new THREE.Mesh(new THREE.BoxGeometry(0.8,0.9,0.6),b));
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.65,0.65),b); head.position.y=0.75; monkeyBody.add(head);
  const face=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.4,0.1),t); face.position.set(0,0.7,0.35); monkeyBody.add(face);
  const eye=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.1),new THREE.MeshBasicMaterial({color:0}));
  let eL=eye.clone();eL.position.set(0.15,0.75,0.4);monkeyBody.add(eL);
  let eR=eye.clone();eR.position.set(-0.15,0.75,0.4);monkeyBody.add(eR);
  const arm=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.8,0.2),b);
  let aL=arm.clone();aL.position.set(0.5,0.1,0);aL.name="armL";monkeyBody.add(aL);
  let aR=arm.clone();aR.position.set(-0.5,0.1,0);aR.name="armR";monkeyBody.add(aR);
  const leg=new THREE.Mesh(new THREE.BoxGeometry(0.25,0.5,0.25),b);
  let lL=leg.clone();lL.position.set(0.25,-0.65,0);lL.name="legL";monkeyBody.add(lL);
  let lR=leg.clone();lR.position.set(-0.25,-0.65,0);lR.name="legR";monkeyBody.add(lR);
  monkey=new THREE.Group(); monkey.add(monkeyBody); monkey.position.y=2; scene.add(monkey);
  monkey.traverse(o=>{if(o.isMesh)o.castShadow=true});
}

// ==================== ENVIRONMENT ====================
function generateBirds(){
  const birdGeo=new THREE.BufferGeometry();
  birdGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array([0,0,0,-0.5,0.2,-0.3,0,0,-0.5,0,0,0,0.5,0.2,-0.3,0,0,-0.5]),3));
  const birdMat=new THREE.MeshBasicMaterial({color:0x000000,side:THREE.DoubleSide});
  for(let i=0;i<BIRD_COUNT;i++){
    const bird=new THREE.Mesh(birdGeo,birdMat);
    const ang=Math.random()*Math.PI*2,rad=20+Math.random()*80;
    bird.position.set(Math.cos(ang)*rad,15+Math.random()*10,Math.sin(ang)*rad);
    bird.userData={ang,rad,speed:0.01+Math.random()*0.01,yBase:bird.position.y,ySpeed:0.5+Math.random()};
    scene.add(bird); birds.push(bird);
  }
}
function generateParticles(){
  const geo=new THREE.BufferGeometry();const pos=new Float32Array(3000);
  for(let i=0;i<3000;i++)pos[i]=(Math.random()-0.5)*200;
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  dustParticles=new THREE.Points(geo,new THREE.PointsMaterial({color:0xa8d5ba,size:0.08,transparent:true,opacity:0.3}));
  scene.add(dustParticles);
}

// ==================== MOBILE LOGIC ====================
function setupMobileControls() {
  const joyZone = document.getElementById('joystick-zone');
  const joyThumb = document.getElementById('joystick-thumb');
  const btnJump = document.getElementById('btn-jump');
  const btnSprint = document.getElementById('btn-sprint');
  const btnCam = document.getElementById('cam-toggle');

  joyZone.addEventListener('touchstart', e => {
    touchJoyActive = true;
    joyTouchId = e.changedTouches[0].identifier;
    const rect = joyZone.getBoundingClientRect();
    joyCenter = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
  }, { passive: false });

  window.addEventListener('touchmove', e => {
    if (!touchJoyActive) return;
    let t = Array.from(e.touches).find(tt => tt.identifier === joyTouchId);
    if (!t) return;
    const dx = t.clientX - joyCenter.x;
    const dy = t.clientY - joyCenter.y;
    const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 60);
    const ang = Math.atan2(dy, dx);
    const tx = Math.cos(ang) * dist;
    const ty = Math.sin(ang) * dist;
    joyThumb.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
    joyInput = { x: tx/60, y: ty/60 };
  }, { passive: false });

  window.addEventListener('touchend', e => {
    if (touchJoyActive) {
      let t = Array.from(e.changedTouches).find(tt => tt.identifier === joyTouchId);
      if (t) {
        touchJoyActive = false;
        joyInput = { x: 0, y: 0 };
        joyThumb.style.transform = `translate(-50%, -50%)`;
      }
    }
  });

  btnJump.addEventListener('touchstart', () => touchJumpActive = true);
  btnJump.addEventListener('touchend', () => touchJumpActive = false);
  btnSprint.addEventListener('touchstart', () => touchSprintActive = true);
  btnSprint.addEventListener('touchend', () => touchSprintActive = false);
  btnCam.addEventListener('touchstart', (e) => { e.preventDefault(); camMode = (camMode+1)%camModes; });
}

// ==================== ANIMATE ====================
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta(), time = clock.elapsedTime;
  updateMonkey(dt, time);
  updateCamera(dt);
  updateEnvironment(time);
  updateMinimap();
  renderer.render(scene, camera);
}

function updateMonkey(dt, time) {
  if (!monkey) return;
  const isSprinting = keys['ShiftLeft'] || keys['ShiftRight'] || touchSprintActive;
  const speed = isSprinting ? MONKEY_SPRINT : MONKEY_SPEED;
  
  let moveX = -joyInput.x, moveZ = -joyInput.y;
  if(keys['ArrowUp']||keys['KeyW']) moveZ += 1;
  if(keys['ArrowDown']||keys['KeyS']) moveZ -= 1;
  if(keys['ArrowLeft']||keys['KeyA']) moveX += 1;
  if(keys['ArrowRight']||keys['KeyD']) moveX -= 1;

  const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir); camDir.y=0; camDir.normalize();
  const camRight = new THREE.Vector3().crossVectors(THREE.Object3D.DEFAULT_UP, camDir);
  const moveVec = new THREE.Vector3().addScaledVector(camDir, moveZ).addScaledVector(camRight, moveX);
  
  if (moveVec.length() > 0.05) {
    if(moveVec.length()>1) moveVec.normalize();
    monkey.position.addScaledVector(moveVec, speed * dt);
    const targetYaw = Math.atan2(moveVec.x, moveVec.z);
    let diff = targetYaw - yaw;
    while(diff < -Math.PI) diff += Math.PI*2; while(diff > Math.PI) diff -= Math.PI*2;
    yaw += diff * 10 * dt; monkey.rotation.y = yaw;
    runPhase += dt * speed * 2;
    const aL=monkeyBody.getObjectByName("armL"),aR=monkeyBody.getObjectByName("armR"),lL=monkeyBody.getObjectByName("legL"),lR=monkeyBody.getObjectByName("legR");
    const s = Math.sin(runPhase)*0.6; aL.rotation.x=-s; aR.rotation.x=s; lL.rotation.x=s; lR.rotation.x=-s;
    monkeyBody.position.y = Math.abs(Math.sin(runPhase*2))*0.1;
  } else {
    monkeyBody.getObjectByName("armL").rotation.x *= 0.9;
    monkeyBody.getObjectByName("armR").rotation.x *= 0.9;
    monkeyBody.position.y *= 0.9;
  }

  const gy = getGroundHeight(monkey.position.x, monkey.position.z);
  if (monkey.position.y > gy + 0.05) { velocityY += GRAVITY * dt; onGround = false; }
  else {
    if (keys['Space'] || touchJumpActive) { velocityY = JUMP_FORCE; onGround = false; }
    else { velocityY = 0; monkey.position.y = gy; onGround = true; }
  }
  monkey.position.y += velocityY * dt;
  if (monkey.position.length() > 195) monkey.position.clampLength(0, 195);
  if (keys['KeyR']) { monkey.position.set(0,5,0); velocityY=0; }
  document.getElementById('speed').innerText = `سرعت: ${Math.floor(moveVec.length()*speed*3.6)} km/h`;
}

function updateCamera(dt) {
  const targetPos = monkey.position.clone();
  if (camMode === 0) {
    const offset = new THREE.Vector3(0, 3, -7).applyQuaternion(monkey.quaternion);
    camera.position.lerp(targetPos.clone().add(offset), 0.1);
    camera.lookAt(targetPos.x, targetPos.y + 1, targetPos.z);
  } else if (camMode === 1) {
    const headPos = targetPos.clone().add(new THREE.Vector3(0, 1, 0.3).applyQuaternion(monkey.quaternion));
    camera.position.copy(headPos);
    camera.lookAt(headPos.clone().add(new THREE.Vector3(0, -0.1, 5).applyQuaternion(monkey.quaternion)));
  } else {
    camera.position.lerp(new THREE.Vector3(15, 10, 15), 0.02); camera.lookAt(targetPos);
  }
}

function updateEnvironment(time) {
  birds.forEach(b => {
    b.userData.ang += b.userData.speed;
    const x=Math.cos(b.userData.ang)*b.userData.rad, z=Math.sin(b.userData.ang)*b.userData.rad, y=b.userData.yBase+Math.sin(time*b.userData.ySpeed)*2;
    b.position.set(x,y,z); b.lookAt(Math.cos(b.userData.ang+0.1)*b.userData.rad,y,Math.sin(b.userData.ang+0.1)*b.userData.rad);
    b.geometry.attributes.position.setY(1, Math.sin(time*15)*0.4); b.geometry.attributes.position.setY(4, Math.sin(time*15)*0.4);
    b.geometry.attributes.position.needsUpdate = true;
  });
  if(dustParticles) { dustParticles.rotation.y+=0.001; dustParticles.position.y=Math.sin(time*0.2)*2; }
}

function updateMinimap() {
  const canvas = document.getElementById('miniCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,100,100);
  const mx=50+(monkey.position.x/400)*100, mz=50+(monkey.position.z/400)*100;
  ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(mx,mz,3,0,Math.PI*2); ctx.fill();
}
init();
</script>
