
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🐒 شبیه‌ساز میمون</title>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; }
canvas { display: block; }
#hud {
  position: fixed; top: 20px; left: 20px; z-index: 10;
  color: #fff; pointer-events: none; user-select: none;
  text-shadow: 0 2px 6px rgba(0,0,0,0.7);
}
#hud h2 { font-size: 22px; margin-bottom: 8px; }

  position: fixed; bottom: 20px; right: 20px; z-index: 10;

}
#minimap {
  position: fixed; bottom: 20px; left: 20px; z-index: 10;
  width: 140px; height: 140px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.4);
  background: rgba(0,40,0,0.5);
  overflow: hidden;
}
#minimap canvas { border-radius: 50%; }
#loading {
  position: fixed; inset: 0; z-index: 100;
  background: linear-gradient(135deg, #1a472a, #0d2818);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #a8d5ba; font-family: 'Segoe UI', Tahoma, sans-serif;
  transition: opacity 0.8s;
}
#loading h1 { font-size: 42px; margin-bottom: 12px; }
#loading p { font-size: 16px; opacity: 0.7; }
#loading .bar { width: 300px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 20px; }
#loading .fill { width: 0%; height: 100%; background: #4ade80; border-radius: 3px; transition: width 0.3s; }
</style>
</head>
<body>

<div id="loading">
  <h1>🌴 جنگل میمون 🐒</h1>
  <p>در حال آماده‌سازی...</p>
  <div class="bar"><div class="fill" id="loadFill"></div></div>
</div>

<div id="hud">
  <h2>🐒 شبیه‌ساز میمون جنگلی</h2>
  <p>⬆⬇⬅➡ / WASD — حرکت<br>
     Space — پرش<br>
     Shift — دویدن سریع<br>
     M — تغییر دوربین<br>
     R — ریست موقعیت</p>
</div>

<div id="speed">سرعت: ۰</div>
<div id="minimap"><canvas id="miniCanvas" width="140" height="140"></canvas></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ==================== GLOBALS ====================
let scene, camera, renderer, clock;
let monkey, monkeyBody;
const keys = {};
let camMode = 0;
const camModes = 3;
let camOffset = new THREE.Vector3();
let camAngleH = 0, camAngleV = 0.3;
let camDist = 8;
const MONKEY_SPEED = 6;
const MONKEY_SPRINT = 14;
const JUMP_FORCE = 10;
const GRAVITY = -25;
let velocityY = 0;
let onGround = true;
let runPhase = 0;
let yaw = 0;

// World gen
const TREE_COUNT = 120;
const ROCK_COUNT = 60;
const FLOWER_COUNT = 200;
const BIRD_COUNT = 8;
const trees = [], rocks = [], flowers = [], birds = [];

// ==================== INIT ====================
function init() {
  clock = new THREE.Clock();

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x3a7d44, 0.008);
  scene.background = new THREE.Color(0x87CEEB);

  // Sky gradient
  const skyGeo = new THREE.SphereGeometry(400, 32, 32);
  const skyMat = new THREE.ShaderMaterial({
    uniforms: {
      topColor: { value: new THREE.Color(0x0077ff) },
      bottomColor: { value: new THREE.Color(0xaaddff) },
      offset: { value: 20 },
      exponent: { value: 0.6 }
    },
    vertexShader: `
      varying vec3 vWorldPosition;
      void main() {
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPos.xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 bottomColor;
      uniform float offset;
      uniform float exponent;
      varying vec3 vWorldPosition;
      void main() {
        float h = normalize(vWorldPosition + offset).y;
        gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
      }`,
    side: THREE.BackSide
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // Sun
  const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.8);
  sunLight.position.set(80, 100, 60);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.set(2048, 2048);
  sunLight.shadow.camera.left = -80;
  sunLight.shadow.camera.right = 80;
  sunLight.shadow.camera.top = 80;
  sunLight.shadow.camera.bottom = -80;
  sunLight.shadow.camera.near = 1;
  sunLight.shadow.camera.far = 250;
  scene.add(sunLight);

  const ambient = new THREE.AmbientLight(0x405530, 0.6);
  scene.add(ambient);

  const hemi = new THREE.HemisphereLight(0x87CEEB, 0x362907, 0.5);
  scene.add(hemi);

  // Camera
  camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
  camera.position.set(0, 5, 10);

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.appendChild(renderer.domElement);

  generateTerrain();
  generateForest();
  generateFlowers();
  generateRocks();
  generateMonkey();
  generateBirds();
  generateParticles();

  // Events
  window.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'KeyM') camMode = (camMode + 1) % camModes; });
  window.addEventListener('keyup', e => keys[e.code] = false);
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // Hide loading
  const fill = document.getElementById('loadFill');
  fill.style.width = '100%';
  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 800);
  }, 600);

  animate();
}

// ==================== TERRAIN ====================
function generateTerrain() {
  const size = 400;
  const seg = 200;
  const geo = new THREE.PlaneGeometry(size, size, seg, seg);
  geo.rotateX(-Math.PI / 2);

  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    let h = Math.sin(x * 0.02) * Math.cos(z * 0.02) * 2
          + Math.sin(x * 0.05 + z * 0.03) * 0.8
          + (Math.random() - 0.5) * 0.3;
    // Flat area in center
    const d = Math.sqrt(x * x + z * z);
    if (d < 30) h *= d / 30;
    pos.setY(i, h);
  }
  geo.computeVertexNormals();

  // Vertex colors for terrain
  const colors = new Float32Array(pos.count * 3);
  for (let i = 0; i < pos.count; i++) {
    const y = pos.getY(i);
    const n = Math.random() * 0.15;
    if (y > 2) {
      colors[i*3] = 0.5 + n; colors[i*3+1] = 0.45 + n; colors[i*3+2] = 0.2 + n;
    } else {
      colors[i*3] = 0.15 + n; colors[i*3+1] = 0.35 + n; colors[i*3+2] = 0.08 + n;
    }
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.MeshStandardMaterial({
    vertexColors: true, roughness: 0.9, metalness: 0
  });
  const ground = new THREE.Mesh(geo, mat);
  ground.receiveShadow = true;
  scene.add(ground);
}

function getGroundHeight(x, z) {
  return Math.sin(x * 0.02) * Math.cos(z * 0.02) * 2
       + Math.sin(x * 0.05 + z * 0.03) * 0.8;
}

// ==================== TREES ====================
function makeTree(height, trunkR) {
  const group = new THREE.Group();

  // Trunk
  const trunkGeo = new THREE.CylinderGeometry(trunkR * 0.6, trunkR, height * 0.5, 8);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.9 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = height * 0.25;
  trunk.castShadow = true;
  group.add(trunk);

  // Foliage layers
  const leafColors = [0x2d7a2d, 0x3a8c3a, 0x276b27, 0x4a9e4a];
  const foliageCount = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < foliageCount; i++) {
    const r = (height * 0.35) * (1 - i * 0.2) + Math.random() * 1.5;
    const fGeo = new THREE.IcosahedronGeometry(r, 1);
    // Deform slightly
    const fp = fGeo.attributes.position;
    for (let j = 0; j < fp.count; j++) {
      fp.setX(j, fp.getX(j) + (Math.random() - 0.5) * r * 0.3);
      fp.setY(j, fp.getY(j) + (Math.random() - 0.5) * r * 0.3);
      fp.setZ(j, fp.getZ(j) + (Math.random() - 0.5) * r * 0.3);
    }
    fGeo.computeVertexNormals();
    const fMat = new THREE.MeshStandardMaterial({
      color: leafColors[Math.floor(Math.random() * leafColors.length)],
      roughness: 0.8, flatShading: true
    });
    const foliage = new THREE.Mesh(fGeo, fMat);
    foliage.position.y = height * 0.5 + i * height * 0.18;
    foliage.castShadow = true;
    foliage.receiveShadow = true;
    group.add(foliage);
  }

  return group;
}

function generateForest() {
  const rng = mulberry32(42);
  function mulberry32(a) { return function() { a |= 0; a = a + 0x6D2B79F5 | 0; var t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
  
  const rng2 = mulberry32(42);

  for (let i = 0; i < TREE_COUNT; i++) {
    const x = (rng2() - 0.5) * 350;
    const z = (rng2() - 0.5) * 350;
    const dist = Math.sqrt(x*x + z*z);
    if (dist < 5) continue; // clear around origin

    const h = 6 + rng2() * 8;
    const tr = 0.3 + rng2() * 0.4;
    const tree = makeTree(h, tr);
    const gy = getGroundHeight(x, z);
    tree.position.set(x, gy, z);
    tree.rotation.y = rng2() * Math.PI * 2;
    scene.add(tree);
    trees.push(tree);
  }

  // Bushes
  for (let i = 0; i < 80; i++) {
    const x = (rng2() - 0.5) * 200;
    const z = (rng2() - 0.5) * 200;
    const bGeo = new THREE.IcosahedronGeometry(0.5 + rng2() * 1.2, 1);
    const bMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0.28 + rng2() * 0.08, 0.6, 0.25 + rng2() * 0.15),
      roughness: 0.8, flatShading: true
    });
    const bush = new THREE.Mesh(bGeo, bMat);
    bush.position.set(x, getGroundHeight(x, z) + 0.3, z);
    bush.castShadow = true;
    scene.add(bush);
  }
}

// ==================== FLOWERS ====================
function generateFlowers() {
  const rng = mulberry32(99);
  function mulberry32(a) { return function() { a |= 0; a = a + 0x6D2B79F5 | 0; var t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 429
4967296; }; }
  const next = rng();

  const colors = [0xff6b6b, 0xffd93d, 0x6bc1ff, 0xff85ff, 0xffffff];
  for (let i = 0; i < FLOWER_COUNT; i++) {
    const x = (rng() - 0.5) * 300;
    const z = (rng() - 0.5) * 300;
    const fGeo = new THREE.CylinderGeometry(0.12, 0, 0.4, 4);
    const fMat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(rng() * colors.length)], emissive: 0x000000 });
    const flower = new THREE.Mesh(fGeo, fMat);
    flower.position.set(x, getGroundHeight(x, z) + 0.15, z);
    scene.add(flower);
  }
}

// ==================== ROCKS ====================
function generateRocks() {
  const rng = () => Math.random();
  for (let i = 0; i < ROCK_COUNT; i++) {
    const x = (rng() - 0.5) * 350;
    const z = (rng() - 0.5) * 350;
    const rGeo = new THREE.DodecahedronGeometry(0.8 + rng() * 1.5, 0);
    const rMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
    const rock = new THREE.Mesh(rGeo, rMat);
    rock.scale.set(1, 0.4 + rng() * 0.4, 1);
    rock.position.set(x, getGroundHeight(x, z) - 0.1, z);
    rock.rotation.set(rng() * 3, rng() * 3, rng() * 3);
    rock.castShadow = true;
    scene.add(rock);
  }
}

// ==================== MONKEY ====================
function generateMonkey() {
  monkeyBody = new THREE.Group();

  const brown = new THREE.MeshStandardMaterial({ color: 0x6e4a2e, roughness: 0.7 });
  const tan = new THREE.MeshStandardMaterial({ color: 0xba956a, roughness: 0.8 });

  // Main body
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.9, 0.6), brown);
  torso.castShadow = true;
  monkeyBody.add(torso);

  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.65, 0.65), brown);
  head.position.y = 0.75;
  head.castShadow = true;
  monkeyBody.add(head);

  // Face
  const face = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.1), tan);
  face.position.set(0, 0.7, 0.35);
  monkeyBody.add(face);

  // Eyes
  const eyeGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(0.15, 0.75, 0.4);
  monkeyBody.add(eyeL);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
  eyeR.position.set(-0.15, 0.75, 0.4);
  monkeyBody.add(eyeR);

  // Arms (swinging)
  const armGeo = new THREE.BoxGeometry(0.2, 0.8, 0.2);
  const armL = new THREE.Mesh(armGeo, brown);
  armL.position.set(0.5, 0.1, 0);
  armL.name = "armL";
  monkeyBody.add(armL);

  const armR = new THREE.Mesh(armGeo, brown);
  armR.position.set(-0.5, 0.1, 0);
  armR.name = "armR";
  monkeyBody.add(armR);

  // Legs
  const legGeo = new THREE.BoxGeometry(0.25, 0.5, 0.25);
  const legL = new THREE.Mesh(legGeo, brown);
  legL.position.set(0.25, -0.65, 0);
  legL.name = "legL";
  monkeyBody.add(legL);

  const legR = new THREE.Mesh(legGeo, brown);
  legR.position.set(-0.25, -0.65, 0);
  legR.name = "legR";
  monkeyBody.add(legR);

  // Tail
  const tail = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 1), brown);
  tail.position.set(0, -0.1, -0.6);
  tail.rotation.x = -0.4;
  monkeyBody.add(tail);

  monkey = new THREE.Group();
  monkey.add(monkeyBody);
  monkey.position.y = 2;
  scene.add(monkey);
}

// ==================== BIRDS ====================
function generateBirds() {
  const birdGeo = new THREE.BufferGeometry();
  const verts = new Float32Array([
    0, 0, 0,  -0.5, 0.2, -0.3,  0, 0, -0.5,
    0, 0, 0,   0.5, 0.2, -0.3,  0, 0, -0.5
  ]);
  birdGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  const birdMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
  
  for (let i = 0; i < BIRD_COUNT; i++) {
    const bird = new THREE.Mesh(birdGeo, birdMat);
    const ang = Math.random() * Math.PI * 2;
    const rad = 20 + Math.random() * 80;
    bird.position.set(Math.cos(ang) * rad, 15 + Math.random() * 10, Math.sin(ang) * rad);
    bird.userData = { 
      ang: ang, rad: rad, speed: 0.01 + Math.random() * 0.01, 
      yBase: bird.position.y, ySpeed: 0.5 + Math.random() 
    };
    scene.add(bird);
    birds.push(bird);
  }
}

// ==================== PARTICLES ====================
let dustParticles;
function generateParticles() {
  const count = 1000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i*3] = (Math.random() - 0.5) * 200;
    pos[i*3+1] = Math.random() * 30;
    pos[i*3+2] = (Math.random() - 0.5) * 200;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0x99ccff, size: 0.1, transparent: true, opacity: 0.4 });
  dustParticles = new THREE.Points(geo, mat);
  scene.add(dustParticles);
}

// ==================== ANIMATE ====================
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const time = clock.elapsedTime;

  updateMonkey(dt, time);
  updateCamera(dt);
  updateEnvironment(time);
  updateMinimap();

  renderer.render(scene, camera);
}

function updateMonkey(dt, time) {
  if (!monkey) return;

  const isSprinting = keys['ShiftLeft'] || keys['ShiftRight'];
  const speed = isSprinting ? MONKEY_SPRINT : MONKEY_SPEED;
  
  let moveX = 0, moveZ = 0;
  if (keys['ArrowUp'] || keys['KeyW']) moveZ += 1;
  if (keys['ArrowDown'] || keys['KeyS']) moveZ -= 1;
  if (keys['ArrowLeft'] || keys['KeyA']) moveX += 1;
  if (keys['ArrowRight'] || keys['KeyD']) moveX -= 1;

  // Relative to camera rotation (on Y)
  const camDir = new THREE.Vector3();
  camera.getWorldDirection(camDir);
  camDir.y = 0;
  camDir.normalize();
  const camRight = new THREE.Vector3().crossVectors(THREE.Object3D.DEFAULT_UP, camDir);

  const moveVec = new THREE.Vector3();
  moveVec.addScaledVector(camDir, moveZ);
  moveVec.addScaledVector(camRight, moveX);
  
  if (moveVec.length() > 0.1) {
    moveVec.normalize();
    monkey.position.addScaledVector(moveVec, speed * dt);
    
    // Rotate monkey to face direction
    const targetYaw = Math.atan2(moveVec.x, moveVec.z);
    let diff = targetYaw - yaw;
    while (diff < -Math.PI) diff += Math.PI * 2;
    while (diff > Math.PI) diff -= Math.PI * 2;
    yaw += diff * 10 * dt;
    monkey.rotation.y = yaw;

    // Run animation
    runPhase += dt * speed * 2;
    const armL = monkeyBody.getObjectByName("armL");
    const armR = monkeyBody.getObjectByName("armR");
    const legL = monkeyBody.getObjectByName("legL");
    const legR = monkeyBody.getObjectByName("legR");

    const swing = Math.sin(runPhase) * 0.6;
    armL.rotation.x = -swing;
    armR.rotation.x = swing;
    legL.rotation.x = swing;
    legR.rotation.x = -swing;
    monkeyBody.position.y = Math.abs(Math.sin(runPhase * 2)) * 0.1;
  } else {
    // Idle
    const armL = monkeyBody.getObjectByName("armL");
    const armR = monkeyBody.getObjectByName("armR");
    armL.rotation.x *= 0.9;
    armR.rotation.x *= 0.9;
    monkeyBody.position.y *= 0.9;
  }

  // Physics
  const gy = getGroundHeight(monkey.position.x, monkey.position.z);
  if (monkey.position.y > gy + 0.05) {
    velocityY += GRAVITY * dt;
    onGround = false;
  } else {
    if (keys['Space']) {
      velocityY = JUMP_FORCE;
      onGround = false;
    } else {
      velocityY = 0;
      monkey.position.y = gy;
      onGround = true;
    }
  }
  monkey.position.y += velocityY * dt;

  // OOB check
  if (monkey.position.length() > 195) {
    monkey.position.clampLength(0, 195);
  }

  // Reset
  if (keys['KeyR']) {
    monkey.position.set(0, 5, 0);
    velocityY = 0;
  }

  document.getElementById('speed').innerText = `سرعت: ${Math.floor(moveVec.length() * speed * 3.6)} کیلومتر بر ساعت`;
}

function updateCamera(dt) {
  const targetPos = monkey.position.clone();
  
  if (camMode === 0) { // Third Person Follow
    const offset = new THREE.Vector3(0, 3, -7).applyQuaternion(monkey.quaternion);
    const ideal = targetPos.clone().add(offset);
    camera.position.lerp(ideal, 0.1);
    camera.lookAt(targetPos.x, targetPos.y + 1, targetPos.z);
  } 
  else if (camMode === 1) { // First Person
    const headPos = targetPos.clone().add(new THREE.Vector3(0, 1, 0.3).applyQuaternion(monkey.quaternion));
    camera.position.copy(headPos);
    const lookAtPos = headPos.clone().add(new THREE.Vector3(0, -0.1, 5).applyQuaternion(monkey.quaternion));
    camera.lookAt(lookAtPos);
  }
  else { // Cinematic / Staticish
    const ideal = new THREE.Vector3(15, 10, 15);
    camera.position.lerp(ideal, 0.02);
    camera.lookAt(targetPos);
  }
}

function updateEnvironment(time) {
  birds.forEach(b => {
    b.userData.ang += b.userData.speed;
    const x = Math.cos(b.userData.ang) * b.userData.rad;
    const z = Math.sin(b.userData.ang) * b.userData.rad;
    const y = b.userData.yBase + Math.sin(time * b.userData.ySpeed) * 2;
    b.position.set(x, y, z);
    b.lookAt(Math.cos(b.userData.ang + 0.1) * b.userData.rad, y, Math.sin(b.userData.ang + 0.1) * b.userData.rad);
    
    // Wing flap
    b.geometry.attributes.position.setY(1, Math.sin(time * 15) * 0.4);
    b.geometry.attributes.position.setY(4, Math.sin(time * 15) * 0.4);
    b.geometry.attributes.position.needsUpdate = true;
  });

  if (dustParticles) {
    dustParticles.rotation.y += 0.001;
    dustParticles.position.y = Math.sin(time * 0.2) * 2;
  }
}

function updateMinimap() {
  const canvas = document.getElementById('miniCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 140, 140);
  
  // Draw monkey
  const mx = 70 + (monkey.position.x / 400) * 140;
  const mz = 70 + (monkey.position.z / 400) * 140;
  
  ctx.fillStyle = '#ff0';
  ctx.beginPath();
  ctx.arc(mx, mz, 3, 0, Math.PI * 2);
  ctx.fill();
  
  // Draw some trees as dots
  ctx.fillStyle = 'rgba(0, 255, 0, 0.5)';
  trees.slice(0, 40).forEach(t => {
    const tx = 70 + (t.position.x / 400) * 140;
    const tz = 70 + (t.position.z / 400) * 140;
    ctx.fillRect(tx, tz, 2, 2);
  });
}

init();
</script>
